<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>BMI Calculator</h1>
    <p>Enter your details below</p>
    <label>Sex:</label>
    <select id="sex">
        <option value="">-- Select --</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    <label>Weight (kg):</label>
    <input type="number" id="weight" placeholder="e.g. 70">
    <label>Height (cm):</label>
    <input type="number" id="height" placeholder="e.g. 170">

    <button onclick="calculateBMI()">Calculate</button>

    <div id="result"></div>

    <script>

        function calculateBMI() {
            const sex = document.getElementById("sex").value
            const height = parseFloat(document.getElementById("height").value)
            const weight = parseFloat(document.getElementById("weight").value)
            console.log(sex, weight, height)

            if (sex === "" || weight <= 0 || height <=0) {
                document.getElementById("result").innerHTML = "Invalid inputs, please fill all fields correctly"
                return 
            }
            
            const heightInMeters = height /100
            const bmi = weight / (heightInMeters ** 2)
            const bmiRounded = bmi.toFixed(2)
            console.log(bmiRounded)

            let category
            let advice

            if (bmi < 18.5){
                category = "Underweight";
                if (sex === "female"){
                    advice = "This may indicate you are not consuming enough nutrients and may have lower body fat and muscle reserves than optimal. Consider speaking to a GP.";
                } else {
                    advice = "You may benefit from increasing your caloric intake and building muscle mass";
                }
            } else if (bmi >= 18.5 && bmi < 25){
                category = "Healthy Weight";
                if (sex === "female"){
                    advice = "You\'re within a healthy range. Women in this range typically have a healthy body fat percentage.";
                } else {
                    advice = "You\'re within a healthy range. Maintaining this with regular exercise is ideal.";
                }
            } else if (bmi >= 25 && bmi < 30) {
                category = "Overweight";
                if (sex === "female"){
                    advice = "BMI is a limited measure for women. Consider also tracking waist-to-hip ratio for a fuller picture.";
                } else{
                    advice = "Men in this range often carry excess visceral fat. Cardio and strength training can help.";
                }
            } else {
                category = "Obese"
                if (sex === "female"){
                    advice = "It may be worth speaking to a healthcare professional about diet, activity, and overall health.";
                } else {
                    advice = "It may be worth speaking to a healthcare professional about diet, activity, and overall health.";
                }
            }
            document.getElementById("result").innerHTML = `Your BMI is ${bmiRounded} <br> Category: ${category} <br> Advice: ${advice}`
        }

    </script>
</body>
</html>
